media: media
content:
  - name: posts
    label: Posts
    type: collection
    path: _posts
    filename:
      template: "{year}-{month}-{day}-{primary}.md"
      field: false
    view:
      fields: [ cover, title ]
    fields:
      - { name: cover, label: Cover Image, type: image }
      - { name: title, label: Title, type: string, required: true }
      - { name: description, label: Description, type: string }
      - { name: date, 
          label: Date,
          type: date,
          options: {
            format: yyyy-MM-dd }}
      - { name: categories, label: Categories, type: select, options: { values: [ "gameplay", "networking", "AI" ] } }
      - { name: tags, label: Tags, type: string }
      - { name: body, label: Body, type: rich-text }